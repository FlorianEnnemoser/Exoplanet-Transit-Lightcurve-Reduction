# CI — lint, type-check, test on push + PR (R-22, S-27, ADR-0007).
name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Oldest supported + latest stable, pinned explicitly. uv rejects "3.x",
        # and a bare "3" resolves to the runner's system Python (3.12) which
        # violates requires-python >=3.13 — bump the pin on new CPython releases.
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-groups  # web group included — tests/test_webapp.py imports fastapi

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy (non-strict)
        run: uv run mypy exotransit/

      - name: Pytest
        run: uv run pytest  # acceptance test self-skips without the WASP-52 b data
