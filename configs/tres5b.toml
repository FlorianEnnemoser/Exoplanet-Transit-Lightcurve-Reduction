schema_version = 1

[observation]
target = "TrES-5 b"
casename = "TrES5"

[paths]
lights = "_TrES5b"
darks  = "_TrES5b"
bias   = "_TrES5b"
flats  = ""
output = "_TrES5b/images"

[stars]
science = { name = "TrES5", x = 349, y = 511 }
calibrators = [
  { name = "Calibrator_1", x = 195, y = 411 },
  { name = "Calibrator_2", x = 434, y = 946 },
]
crop_half_width = 25

[reduction]
method = "standard"
cut = "none"
master_dark_combine = "median"
master_bias_combine = "median"

[photometry]
fwhm = 3.0
threshold_factor = 20.0
threshold_stat = "std"
background_sigma = 3.0
background_maxiters = 5
aperture_radius = 4.0
annulus_inner = 6.0
annulus_outer = 8.0
method = "subpixel"
subpixels = 5

[tracking]
mode = "manual"
reference_frame = 0
manual_shifts = [
  { frame = 21,  dx = 30,  dy = -20 },
  { frame = 44,  dx = 60,  dy = -20 },
  { frame = 76,  dx = 90,  dy = -50 },
  { frame = 99,  dx = 120, dy = -50 },
  { frame = 500, dx = 145, dy = -40 },
]

[transit]
predicted_start = ""
predicted_end   = ""
baseline_fit = "median"

[system]
r_star = 0.866
r_star_err = 0.013
semi_major_axis = 0.02446
period = 1.48224
m_planet = 1.778
m_planet_err = 0.063
transit_duration = 115

[output]
write_csv = true
figures = false
colormap = "gray_r"
figsize = [15, 10]

[logging]
level = "INFO"
file = "exotransit.log"
